name: Deploy to Raspberry Pi

on:
  push:
    branches:
      - raspberry
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          ref: raspberry

      - name: Download cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared

      - name: SSH via Cloudflare Access tunnel
        run: ./cloudflared access ssh --hostname ssh.lsds.fun -- bash -c "cd ~/OutaStock && git fetch --all && git checkout raspberry && git pull origin raspberry && docker compose down && docker compose up --build -d && echo 'Deployment finished!'"