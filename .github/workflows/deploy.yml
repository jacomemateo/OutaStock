name: Deploy to Raspberry Pi

on:
  push:
    branches:
      - raspberry
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '.gitignore'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Essential: fetches all history so branches can be merged

      - name: Merge master into raspberry
        run: |
          # Configure Git identity
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Fetch the latest master
          git fetch origin master
          
          # Merge master into the current branch (raspberry)
          # --no-edit prevents Git from asking for a commit message
          git merge origin/master --no-edit
          
          # Push the merged changes back to the raspberry branch on GitHub
          git push origin raspberry

      - name: Install cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      - name: Setup SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: "ignored"

      - name: Configure SSH Config
        run: |
          mkdir -p ~/.ssh
          cat <<EOF >> ~/.ssh/config
          Host ${{ secrets.PI_HOST }}
            ProxyCommand /usr/local/bin/cloudflared access ssh --hostname %h --id ${{ secrets.CF_CLIENT_ID }} --secret ${{ secrets.CF_CLIENT_SECRET }}
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          EOF

      - name: Execute Remote Command
        run: |
          ssh ${{ secrets.PI_USER }}@${{ secrets.PI_HOST }} << 'EOF'
            cd ~/OutaStock
            git fetch --all
            git checkout raspberry
            git pull origin raspberry
            
            docker compose -f docker-compose.prod.yml down
            docker system prune -af
            docker compose -f docker-compose.prod.yml build --no-cache
            docker compose -f docker-compose.prod.yml up -d



            echo "Deployment finished!"
          EOF
