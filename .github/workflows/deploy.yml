name: Deploy to Raspberry Pi

on:
  push:
    branches:
      - raspberry   # Only triggers when you push to "raspberry"
  workflow_dispatch: # Still allows manual runs from any branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: SSH into Pi and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PI_HOST }}
          username: ${{ secrets.PI_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Deploying on $(date)"
            cd ~/OutaStock
            git pull
            docker compose down
            docker compose up --build -d
            echo "Deployment finished!"
