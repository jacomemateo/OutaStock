name: Deploy to Raspberry Pi

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install cloudflared
        run: |
          curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

      - name: Setup SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: "ignored" # We use StrictHostKeyChecking=no below

      - name: Configure SSH Config
        run: |
          mkdir -p ~/.ssh
          cat <<EOF >> ~/.ssh/config
          Host ${{ secrets.PI_HOST }}
            ProxyCommand /usr/local/bin/cloudflared access ssh --hostname %h --id ${{ secrets.CF_CLIENT_ID }} --secret ${{ secrets.CF_CLIENT_SECRET }}
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          EOF

      - name: Execute Remote Command
        run: |
          ssh -vvv ${{ secrets.PI_USER }}@${{ secrets.PI_HOST }} << 'EOF'
            cd ~/OutaStock
            git fetch --all
            git checkout raspberry
            git pull origin raspberry
            docker compose down
            docker compose up --build -d
            echo "Deployment finished!"
          EOF