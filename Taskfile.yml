version: '3'

# This replaces all that hacky Makefile logic for loading .env files.
# It handles colons in URLs perfectly.
dotenv: ['.env']

tasks:
  default:
    cmds:
      - task --list
    silent: true

  dev-env-setup:
    desc: Create the local development env file if it is missing
    cmds:
      - test -f .env.dev

  dev-auth-sync:
    desc: Export local Air and Vite ZITADEL settings into .env.dev.local
    dir: terraform
    cmds:
      - sh export-dev-env.sh

  dev:
    desc: Start the shared Docker services for local Air and Vite development
    dotenv: [.env.dev]
    cmds:
      - task: dev-env-setup
      - mkdir -p terraform/bootstrap
      - docker volume create outastock-prod_db-data-zitadel >/dev/null
      - docker volume create outastock-prod_zitadel-bootstrap >/dev/null
      - docker compose -p outastock-dev --env-file .env.dev -f docker-compose.dev.yml up db swagger zitadel-db zitadel-api zitadel-login caddy
      - |
        until [ -f terraform/bootstrap/zitadel-admin-sa.json ]; do
          echo "Waiting for ZITADEL bootstrap machine key..."
          sleep 2
        done
      - |
        until curl -s -o /tmp/outastock-dev-zitadel-ready.json -w '%{http_code}' http://auth.localhost/.well-known/openid-configuration | grep -q '^200$'; do
          echo "Waiting for ZITADEL OIDC discovery endpoint..."
          sleep 2
        done
      - |
        cd terraform
        terraform init
        terraform apply -auto-approve
      - task: dev-auth-sync

  connect:
    desc: Access the database CLI
    cmds:
      - docker exec -it vending-db-prod psql -U $APP_DB_USER -d $APP_DB_NAME

  dev-connect:
    desc: Access the development database CLI
    dotenv: [.env.dev]
    cmds:
      - docker exec -it vending-db-dev psql -U $APP_DB_USER -d $APP_DB_NAME

  generate_sqlc:
    desc: Regenerate Go code from SQL queries
    cmds:
      - docker run --rm -v {{.PWD}}:/src -w /src sqlc/sqlc generate

  pretty:
    desc: Run code formatters
    cmds:
      - |
        cd backend/
        gofumpt -w .
        goimports -w .
        cd ../web/
        npm run pretty

  env-setup:
    desc: Create .env file for production from .env.example
    cmds:
      # Use 'test -f' so we don't overwrite an existing .env 
      # which would lose your manual changes (like the Master Key)
      - test -f .env || cp .env.example .env
      - mkdir -p terraform/bootstrap
      - |
        cat > terraform/zitadel-web.env <<EOF
        ZITADEL_ISSUER=${ZITADEL_ISSUER}
        ZITADEL_CLIENT_ID=${ZITADEL_CLIENT_ID}
        ZITADEL_ORGANIZATION_ID=${ZITADEL_ORGANIZATION_ID}
        ZITADEL_REDIRECT_URI=${ZITADEL_REDIRECT_URI}
        ZITADEL_POST_LOGOUT_REDIRECT_URI=${ZITADEL_POST_LOGOUT_REDIRECT_URI}
        ZITADEL_SCOPE=${ZITADEL_SCOPE}
        EOF
      - |
        cat > terraform/zitadel-backend.env <<EOF
        ZITADEL_AUTH_ENABLED=${ZITADEL_AUTH_ENABLED}
        EOF

  setup:
    desc: Bootstrap ZITADEL, apply Terraform, sync auth envs, and run the production stack
    cmds:
      - task: env-setup
      - docker compose -p outastock-prod --env-file .env -f docker-compose.yml up -d --no-deps zitadel-db zitadel-api zitadel-login caddy
      - |
        until [ -f terraform/bootstrap/zitadel-admin-sa.json ]; do
          echo "Waiting for ZITADEL bootstrap machine key..."
          sleep 2
        done
      - |
        until curl -s -o /tmp/outastock-zitadel-ready.json -w '%{http_code}' http://auth.localhost/.well-known/openid-configuration | grep -q '^200$'; do
          echo "Waiting for ZITADEL OIDC discovery endpoint..."
          sleep 2
        done
      - |
        cd terraform
        terraform init
        terraform apply -auto-approve
      - task: auth-sync

  auth-sync:
    desc: Export frontend and backend ZITADEL auth settings from Terraform outputs
    cmds:
      - sh terraform/export-web-env.sh
      - sh terraform/export-backend-env.sh

  nuke:
    desc: Delete the production stack, volumes, and local Terraform runtime artifacts
    cmds:
      - docker compose -p outastock-prod --env-file .env -f docker-compose.yml down -v --remove-orphans
      - rm -rf terraform/.terraform
      - rm -f terraform/terraform.tfstate terraform/terraform.tfstate.backup terraform/terraform.tfstate.*.backup
      - rm -f terraform/zitadel-web.env terraform/zitadel-backend.env
      - rm -f terraform/bootstrap/zitadel-admin-sa.json
      - mkdir -p terraform/bootstrap
      - touch terraform/bootstrap/.gitkeep
  
  seed:
    desc: Run all database seeds on production database
    cmds:
      - |
        for file in db/seeds/*.sql; do
          echo "Seeding $file..."
          docker exec -i vending-db-prod psql -U $APP_DB_USER -d $APP_DB_NAME < $file
        done

  dev-seed:
    desc: Run all database seeds on the development database
    dotenv: [.env.dev]
    cmds:
      - |
        for file in db/seeds/*.sql; do
          echo "Seeding $file..."
          docker exec -i vending-db-dev psql -U $APP_DB_USER -d $APP_DB_NAME < $file
        done

  prod:
    desc: Run the production stack
    cmds:
      - task: setup
      - docker compose -p outastock-prod --env-file .env -f docker-compose.yml up --build

  dev-back:
    desc: Run the Go backend locally with Air against the development stack
    dotenv: [.env.dev]
    cmds:
      - task: dev-auth-sync
      - air

  dev-front:
    desc: Run the Vite frontend locally against the development stack
    dir: web
    deps: [dev-auth-sync]
    dotenv: [.env.dev, .env.dev.local]
    cmds:
      - npm run dev

  dev-down:
    desc: Stop the development Docker services
    dotenv: [.env.dev]
    cmds:
      - docker compose -p outastock-dev --env-file .env.dev -f docker-compose.dev.yml down

  dev-nuke:
    desc: Stop and remove the development Docker services and local auth cache
    dotenv: [.env.dev]
    cmds:
      - docker compose -p outastock-dev --env-file .env.dev -f docker-compose.dev.yml down -v
      - rm -f .env.dev.local
      - rm -f web/.env.local
