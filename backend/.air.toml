root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
args_bin = []
entrypoint = "./tmp/main"
cmd = "go build -o ./tmp/main ./cmd/api"
delay = 1000
exclude_dir = ["assets", "tmp", "vendor", "testdata"]
exclude_file = []
exclude_pattern = ["_test.go"]
exclude_regex = ["_test.go"]
exclude_unchanged = false
full_bin = ""
include_dir = []
include_ext = ["go", "tpl", "tmpl", "html"]
include_file = []
keep_on_interrupt = false
log = "build-errors.log"
poll = false
poll_interval = 0
rerun = false
rerun_delay = 500
send_interrupt = true
kill_delay = 500
stop_on_error = false


[color]
app_name = "yellow"
build_log_cmd_line = "yellow"
main_attr = "magenta"
main_output = ""
output = "color"

[log]
main_n_chars = 10
time = false

[misc]
clean_on_exit = false

[screen]
clear_on_rebuild = false
keep_scroll = true
