# We only need the caddy router and the database since the go backend will be ran with AIR
# for instant reload and the frontend will run with VITE for again, instant reload.
# 
# For development we run both air, vite and this docker-compose file from 3 different
# terminals so we can see everything that's happening!
services:
  caddy:
    image: caddy:latest
    env_file: ".env.dev"
    restart: unless-stopped
    ports:
      - "8081:80"    # Changed this from 80:80 to 8081:80
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

  db:
    image: postgres:18
    container_name: vending-db-dev
    env_file: ".env.dev"
    volumes:
      - db-data:/var/lib/postgresql
      - ./db/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"

  swagger:
    image: swaggerapi/swagger-ui:latest
    environment:
        # This tells the UI to look for the file at the root of the web server
      URL: /openapi.yaml          
    volumes:
        # Correct the destination path to the NGINX root
      - ./docs/openapi.yaml:/usr/share/nginx/html/openapi.yaml:ro
    restart: unless-stopped

volumes:
  db-data:
  caddy_data:   
  caddy_config: 

