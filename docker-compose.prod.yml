services:
  caddy:
    image: caddy:latest
    environment:
      BACKEND_HOST: ${BACKEND_HOST}
      FRONTEND_HOST: ${FRONTEND_HOST}
    restart: unless-stopped
    ports:
      - "80:80"    # HTTP
      - "443:443"  # HTTPS
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend

  db:
    image: postgres:18
    container_name: vending-db-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db-data:/var/lib/postgresql
      - ./db/migrations:/docker-entrypoint-initdb.d
    healthcheck: # Add healthcheck so backend waits for DB
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable
      ECHO_PORT: ${ECHO_PORT}
      ECHO_LOG_LEVEL: ${ECHO_LOG_LEVEL}
    depends_on:
      db:
        condition: service_healthy # Wait for DB to be ready

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    environment:
      # This is injected into window.env at runtime
      API_BASE_URL: ${API_BASE_URL}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db-data:
  caddy_data:   
  caddy_config: 

