services:
  db:
    image: postgres:18
    container_name: vending-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: vending
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql
      - ./db/migrations:/docker-entrypoint-initdb.d
volumes:
  db-data:

