services:
  db:
    image: postgres:18
    container_name: vending-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - db-data:/var/lib/postgresql
      - ./db/migrations:/docker-entrypoint-initdb.d
volumes:
  db-data:

