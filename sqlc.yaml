version: "2"
sql:
  - schema: "backend/db/migrations"
    queries: "backend/db/queries"
    engine: "postgresql"
    gen:
      go:
        package: "repository"
        out: "backend/internal/repository"
        # This tells sqlc to use the pgx/v5 driver (best for Postgres)
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
